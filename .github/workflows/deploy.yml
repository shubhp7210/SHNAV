name: Deploy to Supabase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: buhvavbhshsofhegmrrp

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $PROJECT_ID

      - name: Run database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy --no-verify-jwt airspace-scheduler background-analyzer flight-decision-engine pattern-learner record-flight-outcome route-optimizer trajectory-analysis trajectory-predictor vertiport-coordinator weather-intelligence

      - name: Set INTERNAL_FUNCTION_SECRET
        run: |
          supabase secrets set INTERNAL_FUNCTION_SECRET=${{ secrets.INTERNAL_FUNCTION_SECRET }}
